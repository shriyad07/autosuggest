<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="autosuggest.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <span class = "left-bar">  &#9881;</span>
        <span class = "right-bar">  &#x2022; online | &#x1F552;- ms </span>
    </div>

    <div class = "search-section">
        <h1>
        <span class="auto">Auto</span>Suggest
        </h1>
        <p class = "tag-line">One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>
        <span>
            <span class = "lens">&#128269;</span>
            <input class = "search-bar"  id = "search-bar" placeholder=" Start typing to search...">
        </span>

        <div id = "suggestion-box"> 

            <!-- Suggestions will appear here -->
        </div>
    </div>

    <script>
        var searchBar = document.getElementById("search-bar");
var suggestionBox = document.getElementById("suggestion-box");

searchBar.addEventListener("input", function() {
    // Get user typed text
    var userInput = searchBar.value;

    if (userInput.trim() === '') {
        suggestionBox.innerHTML = "";
        return;
    } else {
        var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var url3 = "&algorithm=brute&limit=10&weighted=false";
        var url = url1 + userInput + url3;

        // Make API call to get suggestions
        fetch(url)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                console.log(data);

                var resultsArray = data.results;
                var htmlResults = "";

                for (var i = 0; i < resultsArray.length; i++) {
                    htmlResults += "<div class='suggestion-item'>" + resultsArray[i].text + "</div>";
                }

                suggestionBox.innerHTML = htmlResults;
            })
            .catch(function(error) {
                console.log(error);
            });
    }
});
    </script>
</body>
</html>
